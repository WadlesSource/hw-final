#cloud-config
package_update: false
package_upgrade: false

runcmd:
  # 1. Ждем снятия блокировок apt фоновыми процессами обновлений Ubuntu
  - echo "Waiting for apt locks..."
  - while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do sleep 2; done

  # 2. Удаляем конфликтующие пакеты и старые репозитории
  - apt-get remove -y containerd runc docker.io docker-ce docker-ce-cli containerd.io
  - rm -f /etc/apt/sources.list.d/docker.list
  - rm -rf /var/lib/apt/lists/*

 # 3. Чистое обновление кэша и установка из стабильного нативного репозитория Ubuntu
  - apt-get update
  - apt-get install -y docker.io docker-compose-v2

  # 4. Настройка автозапуска сервиса и прав доступа пользователя ubuntu
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu
